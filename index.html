<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="main">
        <nav>
            <div class="navbar">
                <h2 class="text">Expense Tracker</h2>
            </div>
        </nav>
 
        <div class="container">
            <h4>Your Balance</h4>
            <h1 id="balance">₹0.00</h1>

            <div class="inc-exp-container">
                <div>
                    <h4>Income</h4>
                    <p id="money-plus" class="money plus">+₹0.00</p>
                </div>
                <div>
                    <h4>Expense</h4>
                    <p id="money-minus" class="money minus">-₹0.00</p>
                </div>
            </div>

            <h3>Set Your Monthly Budget</h3>
            <div class="form-control">
                <label for="budget">Budget</label>
                <input type="number" id="budget" placeholder="Enter budget..." />
            </div>
            <button type="button" class="btn" id="set-budget">Set Budget</button>
            <h4>Your Budget: <span id="budget-display">₹0.00</span></h4>

            <h3>History</h3>
            <ul id="list" class="list"></ul>

            <h3>Add new transaction</h3>
            <form id="form">
                <div class="form-control">
                    <label for="text">Source/Reason</label>
                    <input type="text" id="text" placeholder="Enter text..." />
                </div>
                <div class="form-control">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount..." />
                </div>
                <button type="button" class="btn" id="add-income">Add Income</button>
                <button type="button" class="btn" id="add-expense">Add Expense</button>
            </form>
        </div>

        <div class="chart-container">
            <canvas id="incomeExpenseChart" width="3500" height="2500"></canvas>
        </div>

<div class="monthwise-expenses">
    <h3>Current Month's Expenses</h3>
    <div class="card-container">
        <div class="card" id="current-month-expense">
            <h4 id="current-month-name"></h4>
            <p>Total Expense: <span id="current-month-total">₹0.00</span></p>
        </div>
    </div>
</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
